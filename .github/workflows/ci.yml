name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node lint, build, and tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/contribiq
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/contribiq
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.signature
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.signature
      GITHUB_CLIENT_ID: ci-placeholder
      GITHUB_CLIENT_SECRET: ci-placeholder
      GITHUB_WEBHOOK_SECRET: ci-placeholder
      GITHUB_TOKEN_ENCRYPTION_KEY: ci-placeholder
      REDIS_URL: redis://localhost:6379
      GROQ_API_KEY: gsk_ci_placeholder
      GEMINI_API_KEY: AIza-ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm install --include=dev

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt

      - name: Test
        run: pytest agent/
